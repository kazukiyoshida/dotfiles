# macOS test environment using dockur/macos
# Requires: KVM support (/dev/kvm)
# Usage: docker compose up -d && open http://localhost:8006
#
# After macOS boots:
#   1. Mount shared folder: sudo mount_9p shared
#   2. Run tests: cd /Volumes/shared && bash bin/link.sh && bash tests/test.sh
services:
  macos:
    image: dockurr/macos
    container_name: dotfiles-macos-test
    environment:
      VERSION: "15"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "64G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 5900:5900/tcp
      - 5900:5900/udp
    volumes:
      - /tmp/dotfiles-macos-storage:/storage
      - .:/shared
    stop_grace_period: 120s
